<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" th:fragment="layout (pageTitle, main)">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title th:text="${pageTitle} + ' · CMFS'">AK Solutions</title>
  <link rel="stylesheet" th:href="@{/css/admin-theme.css}"/>
</head>
<body>
<div class="app">
  <aside class="sidebar">
    <div class="sidebar-brand">
      <div class="sidebar-brand-mark"
           th:text="${#strings.isEmpty(currentTenantName)} ? '·' : ${#strings.toUpperCase(#strings.substring(currentTenantName, 0, 1))}">·</div>
      <div class="sidebar-brand-text">
        <div class="sidebar-brand-name"
             th:text="${#strings.isEmpty(currentTenantName)} ? 'Organization' : ${currentTenantName}">Organization</div>
        <div class="sidebar-brand-sub">
          <span th:if="${!#strings.isEmpty(currentTenantCode)}" th:text="${currentTenantCode}">code</span>
          <span th:if="${!#strings.isEmpty(currentTenantCode)}"> · </span>
          Customer Management &amp; Financial System
        </div>
      </div>
    </div>
    <nav class="sidebar-nav" aria-label="Main">
      <a th:href="@{/admin/home}"
         class="nav-link"
         th:classappend="${activeNav} == 'home' ? ' active' : ''">
        <svg width="20" height="20" fill="none" stroke="currentColor" stroke-width="1.8" viewBox="0 0 24 24">
          <path d="M3 10.5L12 3l9 7.5V20a1 1 0 01-1 1h-5v-6H9v6H4a1 1 0 01-1-1v-9.5z"/>
        </svg>
        Home
      </a>
      <div class="nav-section-label">Administrator</div>
      <details class="nav-details" th:open="${openSetup}">
        <summary>Setup</summary>
        <div class="nav-sub">
          <a th:href="@{/admin/setup/users}"
             class="nav-link"
             th:classappend="${activeNav} == 'users' ? ' active' : ''">Users</a>
          <a th:href="@{/admin/setup/user-locations}"
             class="nav-link"
             th:classappend="${activeNav} == 'user-locations' ? ' active' : ''">User Locations</a>
          <a th:href="@{/admin/setup/user-roles}"
             class="nav-link"
             th:classappend="${activeNav} == 'user-roles' ? ' active' : ''">User Roles</a>
        </div>
      </details>
      <details class="nav-details" th:open="${openSecurity}">
        <summary>Security</summary>
        <div class="nav-sub">
          <a th:href="@{/admin/security/user-privileges}"
             class="nav-link"
             th:classappend="${activeNav} == 'user-privileges' ? ' active' : ''">User Privileges</a>
        </div>
      </details>
    </nav>
    <div class="sidebar-footer">
      <a th:href="@{/setup/select-organization}" class="nav-link">
        <svg width="20" height="20" fill="none" stroke="currentColor" stroke-width="1.8" viewBox="0 0 24 24">
          <path d="M8 7h12M8 12h12m-12 5h12M4 7h.01M4 12h.01M4 17h.01"/>
        </svg>
        Switch organization
      </a>
    </div>
  </aside>
  <div class="main-wrap">
    <header class="topbar">
      <div class="search-wrap">
        <label class="visually-hidden" for="global-search">Search</label>
        <input id="global-search" type="search" placeholder="Search modules, users, reports…" autocomplete="off"/>
      </div>
      <div class="topbar-actions">
        <button type="button" class="icon-btn" aria-label="Notifications">
          <svg width="20" height="20" fill="none" stroke="currentColor" stroke-width="1.8" viewBox="0 0 24 24">
            <path d="M15 17h5l-1.405-1.405A2.032 2.032 0 0118 14.158V11a6.002 6.002 0 00-4-5.659V4a2 2 0 10-4 0v1.341C7.67 6.165 6 8.388 6 11v3.159c0 .538-.214 1.055-.595 1.436L4 17h5m6 0v1a3 3 0 11-6 0v-1m6 0H9"/>
          </svg>
        </button>
        <button type="button" class="icon-btn" aria-label="Messages">
          <svg width="20" height="20" fill="none" stroke="currentColor" stroke-width="1.8" viewBox="0 0 24 24">
            <path d="M8 12h.01M12 12h.01M16 12h.01M21 12c0 4.418-4.03 8-9 8a9.863 9.863 0 01-4.255-.949L3 20l1.395-3.72C3.512 15.042 3 13.574 3 12c0-4.418 4.03-8 9-8s9 3.582 9 8z"/>
          </svg>
        </button>
        <div class="user-pill">
          <div class="user-avatar">A</div>
          <div class="user-pill-text">Welcome <strong>Administrator</strong></div>
        </div>
      </div>
    </header>
    <div class="main-inner" th:replace="${main}">
      <!-- page content -->
    </div>
  </div>
</div>
<style>
  .visually-hidden {
    position: absolute;
    width: 1px;
    height: 1px;
    padding: 0;
    margin: -1px;
    overflow: hidden;
    clip: rect(0, 0, 0, 0);
    border: 0;
  }
</style>
</body>
</html>
