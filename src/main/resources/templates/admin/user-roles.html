<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" th:replace="~{fragments/admin-shell :: layout(${pageTitle}, ~{::page-main})}">
<body>
<th:block th:fragment="page-main">
  <h1 class="page-title">User Roles</h1>
  <p class="page-sub">Administrator · Setup — role master (list + entry).</p>

  <div class="toolbar">
    <input class="input-dark" type="search" name="q" placeholder="Enter keyword to search" aria-label="Search"/>
    <select class="select-dark" name="filter" aria-label="Filter">
      <option value="all">All</option>
    </select>
    <button type="button" class="btn btn-ghost">Search</button>
  </div>

  <div class="grid-cards">
    <div class="card">
      <div class="card-label">List</div>
      <div class="table-wrap">
        <table class="data-table">
          <thead>
          <tr>
            <th>Role ID</th>
            <th>Role description</th>
            <th>Remarks</th>
          </tr>
          </thead>
          <tbody>
          <tr>
            <td class="cell-muted">001</td>
            <td>BOOKING</td>
            <td class="cell-muted">—</td>
          </tr>
          <tr>
            <td class="cell-muted">002</td>
            <td>Manager</td>
            <td class="cell-muted">—</td>
          </tr>
          <tr>
            <td class="cell-muted">003</td>
            <td>Administrator</td>
            <td class="cell-muted">—</td>
          </tr>
          <tr>
            <td class="cell-muted">004</td>
            <td>Accountant</td>
            <td class="cell-muted">—</td>
          </tr>
          <tr>
            <td class="cell-muted">005</td>
            <td>MD</td>
            <td class="cell-muted">Can only do…</td>
          </tr>
          </tbody>
        </table>
      </div>
      <div class="pagination-bar" aria-label="Pagination">
        <button type="button" class="page-btn active">1</button>
        <button type="button" class="page-btn">2</button>
      </div>
    </div>

    <div class="card">
      <div class="card-label">Entry</div>
      <form id="role-entry-form" class="form-grid form-grid-wide" action="#" method="post" th:action="@{/admin/setup/user-roles}" onsubmit="return false;">
        <label class="field-label" for="role-id">Role ID</label>
        <div>
          <input class="input-dark" id="role-id" name="roleId" type="text" value="Auto generated" readonly aria-readonly="true"/>
          <div class="field-hint">System-generated on save</div>
        </div>

        <label class="field-label" for="role-code">Role code</label>
        <input class="input-dark" id="role-code" name="roleCode" type="text" maxlength="16" placeholder="e.g. 001 (optional display code)"/>

        <label class="field-label" for="role-description">Role description</label>
        <input class="input-dark" id="role-description" name="description" type="text" required maxlength="255" placeholder="BOOKING, Manager, Administrator…"/>

        <label class="field-label" for="role-remarks">Remarks</label>
        <textarea class="textarea-dark" id="role-remarks" name="remarks" rows="4" placeholder="Optional notes"></textarea>
      </form>

      <div class="toolbar" style="margin-top:1.25rem;margin-bottom:0">
        <button type="submit" form="role-entry-form" class="btn btn-primary">Save</button>
        <button type="button" class="btn btn-ghost">Update</button>
        <button type="button" class="btn btn-ghost">Delete</button>
        <button type="reset" form="role-entry-form" class="btn btn-ghost">Reset</button>
      </div>
    </div>
  </div>
</th:block>
</body>
</html>
